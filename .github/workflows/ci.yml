name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------------------
  # 1. Formatting and Auto-Commit Job
  # -------------------------------------------------------------
  # This job automatically formats the code (e.g., using Prettier) and commits
  # the changes back to the branch. This ensures all code is consistently formatted.
  format:
    name: Format Code and Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For pull requests, checkout the source branch instead of the merge ref.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # npm ci is used for a clean, deterministic install based on package-lock.json
        run: npm ci

      - name: Run code formatting
        run: npm run format

      - name: Check for modified files
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit formatted code
        if: steps.git-check.outputs.has_changes == 'true'
        # Uses a community action to commit changes back to the current branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: Formatted the code automatically"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: ".github/workflows/**/*.yml *.json src/**/*.ts"
  #
  #   # -------------------------------------------------------------
  #   # 2. Linting Job
  #   # -------------------------------------------------------------
  #   # This job runs static code analysis (e.g., ESLint) to catch potential bugs
  #   # or style violations before testing.
  #   lint:
  #     name: Lint Code
  #     # We wait for the formatting job to finish to avoid conflicts
  #     needs: format
  #     runs-on: ubuntu-latest
  #     steps:
  #       - name: Checkout repository
  #         uses: actions/checkout@v4
  #
  #       - name: Setup Node.js
  #         uses: actions/setup-node@v4
  #         with:
  #           node-version: '20'
  #           cache: 'npm'
  #
  #       - name: Install dependencies
  #         run: npm ci
  #
  #       - name: Run linter
  #         # TODO: Add a "lint" script in package.json (e.g., "eslint src/**/*.ts")
  #         run: npm run lint
  #
  #   # -------------------------------------------------------------
  #   # 3. Unit Tests Job
  #   # -------------------------------------------------------------
  #   # This job isolates individual functions and modules to test their behavior.
  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    # Re-add `needs: format` once the formatting job exists in this workflow.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
  # -------------------------------------------------------------
  # 4. Integration Tests Job
  # -------------------------------------------------------------
  # This job tests the interaction between different components, such as
  # starting the Express server and making HTTP requests against it.
  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        # Compiles TypeScript to JavaScript (dist/ folder) before running integration tests
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration

