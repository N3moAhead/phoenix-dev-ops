name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------
  # 1. Formatting and Auto-Commit Job
  # -------------------------------------------------------------
  # This job automatically formats the code (e.g., using Prettier) and commits
  # the changes back to the branch. This ensures all code is consistently formatted.
  format:
    name: Format Code and Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For pull requests, checkout the source branch instead of the merge ref.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # npm ci is used for a clean, deterministic install based on package-lock.json
        run: npm ci

      - name: Run code formatting
        run: npm run format

      - name: Check for modified files
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit formatted code
        if: steps.git-check.outputs.has_changes == 'true'
        # Uses a community action to commit changes back to the current branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: Formatted the code automatically"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

    # -------------------------------------------------------------
    # 2. Linting Job
    # -------------------------------------------------------------
    # This job runs static code analysis (e.g., ESLint) to catch potential bugs
    # or style violations before testing.
  lint:
    name: Lint Code
    # We wait for the formatting job to finish to avoid conflicts
    needs: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0" # AI suggested using a Node version that satisfies ESLint 10’s engine requirement
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

    # -------------------------------------------------------------
    # 3. Unit Tests Job
    # -------------------------------------------------------------
    # This job isolates individual functions and modules to test their behavior.
  unit-test:
    name: Run Unit Tests
    needs: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
  # -------------------------------------------------------------
  # 4. Integration Tests Job
  # -------------------------------------------------------------
  # This job tests the interaction between different components, such as
  # starting the Express server and making HTTP requests against it.
  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        # Compiles TypeScript to JavaScript (dist/ folder) before running integration tests
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration

  # -------------------------------------------------------------
  # 5. Deployment Job
  # -------------------------------------------------------------
  # Packages the build output and transfers it to a deployment target directory,
  # which is then published as a GitHub Actions artifact.
  deploy:
    name: Package and Deploy Artifact
    needs: [lint, unit-test, integration-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Prepare deployment target
        run: npm run deploy:prepare

      - name: Upload deployed artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployed-package-${{ github.sha }}
          path: deployment/target
          if-no-files-found: error
          retention-days: 7

  # -------------------------------------------------------------
  # 6. Publish to Registry Job
  # -------------------------------------------------------------
  # This job would publish the package to the npm registry. It is intentionally
  # kept as a future extension once a real release workflow is needed.
